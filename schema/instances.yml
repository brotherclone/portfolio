    usedSkill:
      - gwi:skill_uxResearch
      - gwi:skill_productStrategy
    taughtAt:
      - gwi:org_mica
      - gwi:org_jhu
    summary: >-
      Graduate studio instruction at MICA (MFA Graphic Design) and
      Johns Hopkins continuing education. Interaction design, UX, digital
      strategy. Concurrent with agency work.
    detail: >-
      Graduate studio instruction at MICA's MFA Graphic Design program and
      Johns Hopkins continuing education, running concurrently with agency work.
      At MICA, taught a utility design course built on a specific thesis: that
      the tactile vocabulary of early electronic components — switches,
      potentiometers, buttons, dials — established the foundational heuristics
      of interface expectation. Students traced that lineage from physical
      affordance through skeuomorphic UI to flat design, then used those
      heuristics as a critical lens for interrogating when and why to invent new
      interface elements versus honouring established convention. At JHU, the
      brief was entirely different: journalism and communications students who
      had never touched creative production tools, in a media landscape that was
      getting scrappier by the semester. The course was deliberately DIY in
      tone — students shipped podcasts, social video, interactive articles, and
      infographics, with urgency and resourcefulness valued over polish. Two
      very different rooms, the same underlying conviction that making things is
      how you understand them.
