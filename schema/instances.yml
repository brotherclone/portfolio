  # PROJECTS (skeleton — full narrative population is Phase 5)

  proj_lego:
    instance_of: Project
    id: gwi:proj_lego
    label: LEGO Physical-Digital Integration
    startYear: 2000
    endYear: 2010
    confidential: false
    category: design
    nodeWeight: 0.9
    partOfEra:
      - gwi:era_lego
    workedAt:
      - gwi:org_lego
    engagementType: direct
    inDomain:
      - gwi:domain_consumerProduct
      - gwi:domain_creativeTech
    involvedConcept:
      - gwi:concept_experienceIntegration
      - gwi:concept_physicalDigital
    usedSkill:
      - gwi:skill_js
      - gwi:skill_animation3d
      - gwi:skill_arduino
      - gwi:skill_uxResearch
    summary: >-
      Ten years architecting the integration of physical play and digital
      experience across global markets. NYC, London, and Denmark.
      Before IoT was a category.
    detail: >-
      Ten years of varied physical-digital integration work spanning web games,
      desktop software, early AR, audio experiences, and networked play. Built
      web games with embedded audio for the Galidor line; contributed to LEGO
      Digital Designer, a consumer CAD tool for building virtual models. Led
      concept development for an early AR prototype before the category had a
      name. Produced a proto-podcast for the Life on Mars campaign. Consulted
      on LEGO Universe, the brand's MMO. Designed and shipped ARGs, physical
      card and board games, and dozens of browser-based games across product
      lines. Closed the decade with My LEGO Network — a children's-safe social
      network with moderated profiles, trading mechanics, and badge systems.

  proj_interactive_television:
    instance_of: Project
    id: gwi:proj_interactive_television
    label: Interactive Television
    startYear: 1998
    endYear: 2000
    confidential: false
    category: interactive_television
    nodeWeight: 0.85
    partOfEra:
      - gwi:era_earlyWeb
    workedAt:
      - gwi:org_news_digital
      - gwi:org_oxygen_media
    engagementType: direct
    summary: >-
      Early convergence content for web and proto OTT broadcasts.
    detail: >-
      Pioneering interactive television work at the very edge of what the medium
      could do in 1998. Built SMIL-based hotspot video experiences that loaded
      onto set-top boxes, layering interactive elements onto news and
      entertainment content in real time. SMIL — the W3C's Synchronized
      Multimedia Integration Language — was barely a standard yet; the work
      meant operating without frameworks, documentation, or precedent, and
      negotiating the severe constraints of early set-top box hardware. Worked
      across News Digital and Oxygen Media, the women's cable network, producing
      convergent web and proto-OTT content before either category had a name.
      The earliest expression of a pattern that persisted for 25 years: arriving
      at an intersection before the roads were built.

  proj_television_documentaries:
    instance_of: Project
    id: gwi:proj_television_documentaries
    label: Cable Television Documentaries
    startYear: 1997
    endYear: 1998
    confidential: false
    category: film_and_television
    nodeWeight: 0.85
    partOfEra:
      - gwi:era_earlyWeb
    workedAt:
      - gwi:org_pacific_street_films
    engagementType: direct
    summary: >-
      Documentary content for PBS, Lifetime, A&E. Film production and post-production roles.
    detail: >-
      Early career film production work at Pacific Street Films, in the roles of
      associate producer and researcher. Worked on Intimate Portrait — the
      Lifetime biographical documentary series — for the Jessica Lange episode.
      Subsequently contributed to two multi-part documentary series: one
      exploring the warrior tradition across cultures, from the Samurai to the
      French Foreign Legion, broadcast on A&E; and a musical history series for
      PBS. The formative experience that built the editorial instincts and
      storytelling discipline that run through everything that came after.

  proj_adobe:
    instance_of: Project
    id: gwi:proj_adobe
    label: Adobe Enterprise UX
    startYear: 2014
    endYear: 2017
    confidential: false
    category: design
    nodeWeight: 0.75
    partOfEra:
      - gwi:era_agency
    workedAt:
      - gwi:org_adobe
    engagementType: direct
    inDomain:
      - gwi:domain_enterprise
    involvedConcept:
      - gwi:concept_contentModeling
      - gwi:concept_experienceIntegration
    usedSkill:
      - gwi:skill_uxResearch
      - gwi:skill_productStrategy
      - gwi:skill_contentStrategy
    summary: >-
      Enterprise UX at Adobe's federal and enterprise division in McLean.
      Design systems, content modelling, product strategy the Intelligence Sector.
    detail: >-
      Enterprise UX at Adobe's federal division in McLean, serving the US
      intelligence community. Primary engagement: designed a classified
      publication system for the CIA with granular redaction controls — the
      workflow that produces the President's Daily Briefing. Secondary
      engagement: worked with the Open Source Center to design a multi-feed
      video capture and intelligence-gathering system for monitoring foreign
      broadcasts. A parallel challenge ran through both projects: a new
      generation of analysts entering the intelligence community had grown up
      on consumer software and found legacy tools impenetrable — closing that
      gap between defence-grade rigor and consumer-grade usability was the core
      design problem. Both engagements permanently shaped how I think about
      content modelling, permissioning, and designing for zero-tolerance error
      states.

  proj_threespot_rwj:
    instance_of: Project
    id: gwi:proj_threespot_rwj
    label: Robert Wood Johnson Foundation Digital Platform
    startYear: 2011
    endYear: 2013
    confidential: false
    category: strategy
    nodeWeight: 0.65
    partOfEra:
      - gwi:era_agency
    workedAt:
      - gwi:org_threespot
    deliveredFor:
      - gwi:org_rwj
      - gwi:org_macarthur
      - gwi:org_knight
    engagementType: embedded
    inDomain:
      - gwi:domain_nonprofit
    involvedConcept:
      - gwi:concept_contentModeling
      - gwi:concept_experienceIntegration
    usedSkill:
      - gwi:skill_contentStrategy
      - gwi:skill_uxResearch
    summary: >-
      Embedded UX and content strategy lead for the Robert Wood Johnson
      Foundation's digital platform rebuild. Employed by Threespot,
      working on-site at RWJF.
    detail: >-
      Embedded full-time at the Robert Wood Johnson Foundation as UX and
      content strategy lead for a ground-up rebuild of their digital platform.
      The core design challenge was dual audience: the platform needed to
      surface content by grant program — palliative medicine, childhood obesity,
      health equity — for foundation staff and grantees, while simultaneously
      organizing the same content by subject matter for the broader research
      community and grant seekers. Designed a modular publication system with a
      flexible taxonomy that served both traversal modes without requiring
      duplicate content authoring. During the same period, delivered similar
      content strategy and IA engagements for the MacArthur Foundation and the
      Knight Foundation on a consulting basis. The concentration of major
      philanthropy work in this window cemented content modelling as a design
      discipline for me.

  proj_huge_axa:
    instance_of: Project
    id: gwi:proj_huge_axa
    label: Stantec & AXA — Huge
    startYear: 2013
    endYear: 2014
    confidential: false
    category: design
    nodeWeight: 0.6
    partOfEra:
      - gwi:era_agency
    workedAt:
      - gwi:org_huge
    deliveredFor:
      - gwi:org_axa
      - gwi:org_stantec
    engagementType: consulting
    inDomain:
