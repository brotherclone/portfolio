      - gwi:domain_enterprise
    involvedConcept:
      - gwi:concept_experienceIntegration
    usedSkill:
      - gwi:skill_uxResearch
      - gwi:skill_productStrategy
    summary: >-
      Two major client engagements at Huge: a redesign for Stantec putting a
      human face on engineering consulting, and an iOS app for AXA to drive
      403(b) retirement enrollment among K-12 teachers.
    detail: >-
      Two major engagements during a short stint at Huge. First: a comprehensive
      redesign for Stantec, the global engineering consultancy, aimed at putting
      a more human face on their technical practice — repositioning a firm known
      for infrastructure and engineering toward a story about people, places, and
      community impact. Second: an iOS app for AXA Investment Managers targeted
      at K-12 teachers, designed to demystify 403(b) retirement accounts and
      drive enrollment. Both projects shared a similar brief — translating
      complex, expertise-driven offerings into approachable consumer-facing
      experiences.

  proj_moleskine:
    instance_of: Project
    id: gwi:proj_moleskine
    label: Moleskine Digital Transformation
    startYear: 2017
    endYear: 2021
    confidential: false
    category: strategy
    nodeWeight: 0.8
    partOfEra:
      - gwi:era_international
    workedAt:
      - gwi:org_moleskine
    engagementType: direct
    inDomain:
      - gwi:domain_consumerProduct
    involvedConcept:
      - gwi:concept_experienceIntegration
      - gwi:concept_contentModeling
    usedSkill:
      - gwi:skill_productStrategy
      - gwi:skill_uxResearch
      - gwi:skill_contentStrategy
    summary: >-
      Product architecture and digital transformation at Moleskine, Milan.
      Consumer product meets digital platform — global brand, international team.
    detail: >-
      Four years as product architect at Moleskine's Milan headquarters, spanning
      two major initiatives. The first was a partnership with IBM to build a
      personalized creativity platform — combining machine learning with
      Moleskine's content library to generate tailored plans of drawing, writing,
      and mindfulness exercises for individual users. The second centred on
      Moleskine's digital pen, a device that captured handwriting on smart paper
      and bridged analog and digital workflows — designed apps and managed
      partnerships that extended the pen ecosystem across third-party platforms
      and creative tools. Both projects sat at the same intersection: analogue
      identity meeting digital capability, at a brand whose entire equity is
      built on the romance of the physical.

